# Template book config — copy this directory to <sem>/<COURSE>/ and then
# update `title`, `output-dir`, and the `chapters:` list. The relative
# paths to `Notes/_metadata.yml` and the shared preamble assume the
# standard `<root>/<sem>/<course>/notes/` depth.

project:
  type: book
  output-dir: ../../../Notes/docs/REPLACE_SEM/REPLACE_COURSE
book:
  title: Example Course — Module X
  subtitle: A template demonstrating every Quarto pattern used in the project
  author:
  - name: Your Name
  date: today
  chapters:
  - index.qmd
  - chapters/01-introduction.qmd
  - chapters/02-callout-tour.qmd
  - chapters/03-exercises.qmd
format:
  pdf:
    documentclass: scrbook
execute:
  freeze: auto
  error: true
  eval: false
metadata-files:
- ../../../Notes/_metadata.yml
