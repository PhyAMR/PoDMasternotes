# GitHub repo URL per course — used by generate_listing.py to build the
# projects.qmd landing pages. One repo per course is the default; put the
# clone URL of each project repo here. Anything missing falls back to a
# placeholder ("https://github.com/USERNAME/REPO") so the build still works.

1sem:
  LCPA: https://github.com/USERNAME/LCPA-projects
  ML:   https://github.com/USERNAME/ML-projects
  MAPDA: https://github.com/USERNAME/MAPDA-projects
  MTP:  https://github.com/USERNAME/MTP-projects
  QIAP: https://github.com/USERNAME/QIAP-projects

2sem:
  ASPA:  https://github.com/USERNAME/ASPA-projects
  LCPB:  https://github.com/USERNAME/LCPB-projects
  MAPDB: https://github.com/USERNAME/MAPDB-projects
  PCN:   https://github.com/USERNAME/PCN-projects
