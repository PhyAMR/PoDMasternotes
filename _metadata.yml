format:
  pdf:
    papersize: a4
    fontsize: 11pt
    linestretch: 1.15
    geometry:
    - margin=2.3cm
    - top=2.5cm
    - bottom=2.6cm
    - footskip=1.1cm
    colorlinks: true
    linkcolor: ink
    urlcolor: unipdRed
    citecolor: unipdRed
    number-sections: true
    toc-depth: 3
    include-in-header:
    - ../../../Notes/pdf/preamble.tex
    filters:
    - ../../../Notes/pdf/code-output.lua
    highlight-style: tango
    code-block-bg: '#f3f3f3'
    code-block-border-left: true
    code-overflow: wrap
  html:
    theme:
    - cosmo
    - ../../../Notes/unipd-style.css
    toc: true
    toc-depth: 3
    number-sections: true
    callout-appearance: simple
    code-fold: true
    code-tools: true
    code-summary: Show code
    highlight-style: tango
    fig-format: png
    fig-dpi: 150
    embed-resources: false
    self-contained: false
    page-layout: full
    link-external-icon: true
    link-external-newwindow: true
    other-formats: false
    filters:
    - ../../../Notes/pdf/tex-to-svg.lua
    include-after-body:
      text: "<style>\n  body, p, li, h1, h2, h3, h4, h5, h6, .quarto-title-block,\n\
        \  .sidebar, .toc-active, .nav-link, table, th, td, blockquote,\n  figcaption,\
        \ .callout, .callout-body, .quarto-figure {\n    user-select: none; -webkit-user-select:\
        \ none;\n    -moz-user-select: none; -ms-user-select: none;\n  }\n  img, svg,\
        \ .figure-img, .quarto-figure img {\n    pointer-events: none; user-select:\
        \ none;\n    -webkit-user-drag: none; -webkit-touch-callout: none;\n  }\n\
        \  pre, pre code, code, .sourceCode, .sourceCode * {\n    user-select: text\
        \ !important;\n    -webkit-user-select: text !important;\n    -moz-user-select:\
        \ text !important;\n  }\n</style>\n<script>\n  document.addEventListener('contextmenu',\
        \ function(e) {\n    if (!e.target.closest('pre, code, .sourceCode')) e.preventDefault();\n\
        \  });\n  document.addEventListener('dragstart', function(e) {\n    if (e.target.tagName\
        \ === 'IMG' || e.target.tagName === 'SVG') e.preventDefault();\n  });\n  document.addEventListener('copy',\
        \ function(e) {\n    var sel = window.getSelection();\n    if (!sel || sel.rangeCount\
        \ === 0) return;\n    var node = sel.getRangeAt(0).commonAncestorContainer;\n\
        \    var el = node.nodeType === 1 ? node : node.parentElement;\n    if (el\
        \ && el.closest('pre, code, .sourceCode')) return;\n    e.preventDefault();\n\
        \  });\n  document.addEventListener('keydown', function(e) {\n    var k =\
        \ e.key.toLowerCase();\n    if ((e.ctrlKey || e.metaKey) && (k === 's' ||\
        \ k === 'u' || k === 'p')) {\n      if (!e.target.closest('pre, code, .sourceCode'))\
        \ e.preventDefault();\n    }\n  });\n</script>\n<style>\n  details.solution-collapsible\
        \ {\n    border-left: 3px solid #b8123e;\n    padding: 0.4em 0.75em;\n   \
        \ margin: 1em 0;\n    background: #fbf3f5;\n    border-radius: 0 4px 4px 0;\n\
        \  }\n  details.solution-collapsible > summary {\n    cursor: pointer; font-weight:\
        \ 600; color: #b8123e;\n    list-style: none; user-select: none;\n  }\n  details.solution-collapsible\
        \ > summary::-webkit-details-marker {\n    display: none;\n  }\n  details.solution-collapsible\
        \ > summary::before {\n    content: '\\25B6';\n    display: inline-block;\
        \ margin-right: 0.5em;\n    transition: transform 0.15s ease;\n  }\n  details.solution-collapsible[open]\
        \ > summary::before {\n    transform: rotate(90deg);\n  }\n  details.solution-collapsible\
        \ > div.solution {\n    margin-top: 0.5em; border-left: none; padding-left:\
        \ 0;\n  }\n</style>\n<script>\n  document.addEventListener('DOMContentLoaded',\
        \ function() {\n    document.querySelectorAll('div.solution').forEach(function(el)\
        \ {\n      if (el.closest('details.solution-collapsible')) return;\n     \
        \ var d = document.createElement('details');\n      d.className = 'solution-collapsible';\n\
        \      var s = document.createElement('summary');\n      s.textContent = 'Solution';\n\
        \      d.appendChild(s);\n      el.parentNode.insertBefore(d, el);\n     \
        \ d.appendChild(el);\n    });\n  });\n</script>"
